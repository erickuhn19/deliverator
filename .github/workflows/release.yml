name: Release

# Cut a release when a v* tag is pushed: build the 4 platform binaries, checksums,
# SBOMs, cosign-keyless-sign the checksums, publish the GitHub Release, and update
# the Homebrew tap. Requires the HOMEBREW_TAP_GITHUB_TOKEN secret (fine-grained PAT,
# contents:write on erickuhn19/homebrew-tap).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the release + upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so the changelog can diff from the last tag
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          check-latest: false

      # syft for SBOM generation.
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: release --clean
        env:
          # Scoped to this repo — creates the release + uploads assets.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cross-repo push to the Homebrew tap (fine-grained PAT).
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
